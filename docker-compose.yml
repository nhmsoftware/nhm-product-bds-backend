services:
  # --- Service Backend ---
  app:
    build: .
    container_name: nhm-bds-app
    restart: unless-stopped
    mem_limit: 200m
    volumes:
      - .:/var/www
    ports:
      - "8011:8000"
    env_file: .env
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6379
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- Service Realtime
  realtime:
    build:
      context: ../nhm-product-bds-realtime
      dockerfile: Dockerfile
    container_name: nhm-bds-realtime
    restart: unless-stopped
    volumes:
      - ../nhm-product-bds-realtime:/app
      - /app/node_modules
    ports:
      - "8012:3001"
    env_file: ../nhm-product-bds-realtime/.env
    environment:
      # Sửa từ 'redis' thành 'host.docker.internal' để dùng chung Redis với App
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6379
    # Thêm extra_hosts để Node.js biết host.docker.internal là máy Ubuntu của bạn
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450